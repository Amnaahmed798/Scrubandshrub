  <path d="M55,38 L60,50 L55,60" stroke="#f8d9b7" stroke-width="3" fill="none" />
  <path d="M45,50 L55,50" stroke="#f8d9b7" stroke-width="3" />
  <!-- Vacuum cleaner -->
  <rect x="65" y="55" width="15" height="8" fill="#7d7d7d" />
