<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#f0f0f0" />
  <!-- Person cleaning windows -->
  <circle cx="50" cy="30" r="8" fill="#f8d9b7" />
  <path d="M45,38 L40,50 L45,60" stroke="#f8d9b7" stroke-width="3" fill="none" />
  <path d="M55,38 L60,50 L55,60" stroke="#f8d9b7" stroke-width="3" fill="none" />
  <path d="M45,50 L55,50" stroke="#f8d9b7" stroke-width="3" />
  <!-- Window -->
  <rect x="30" y="50" width="40" height="30" fill="none" stroke="#87ceeb" stroke-width="3" />
  <line x1="30" y1="65" x2="70" y2="65" stroke="#87ceeb" stroke-width="2" />
  <line x1="50" y1="50" x2="50" y2="80" stroke="#87ceeb" stroke-width="2" />
  <!-- Cleaning tool -->
  <rect x="70" y="55" width="8" height="3" fill="#7d7d7d" />
  <path d="M74,56 L80,50" stroke="#7d7d7d" stroke-width="2" />
  <!-- Water droplets -->
  <circle cx="40" cy="55" r="2" fill="#4fc3f7" />
  <circle cx="55" cy="60" r="2" fill="#4fc3f7" />
  <circle cx="45" cy="70" r="2" fill="#4fc3f7" />
</svg>